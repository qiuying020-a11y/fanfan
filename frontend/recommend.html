<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>推荐</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>body{font-family:Arial;margin:16px} pre{background:#f6f6f6;padding:8px;border:1px solid #eee}</style>
  </head>
  <body>
    <link rel="stylesheet" href="/styles.css">
    <header class="site-header">
      <div class="site-title">推荐系统</div>
      <div class="nav small">
        <a href="/">总览</a>
        <a href="/stats.html">统计分析</a>
        <a href="/model.html">模型</a>
        <a href="/recommend.html">推荐</a>
        <a href="/user.html">用户画像</a>
        <a href="/rank.html">热度榜单</a>
      </div>
    </header>
    <div class="layout">
      <aside class="sidebar card">
        <div class="small muted">推荐系统</div>
        <div class="small muted" style="margin-top:8px">• 内容推荐：基于电影相似度</div>
        <div class="small muted" style="margin-top:4px">• 协同推荐：基于用户评分</div>
      </aside>
      <main class="main">
        <div class="card">
          <h3 class="small muted">🎬 影片相似推荐</h3>
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
            <label>输入影片ID：<input id="m_id" value="1" style="width:80px;padding:6px;border:1px solid #ddd" /></label>
            <button id="m_btn" class="button">查询相似影片</button>
          </div>
          <div id="m_chart" style="width:100%;height:280px;margin-bottom:12px"></div>
          <div id="m_table" class="table-wrap"></div>
        </div>
        <div class="card">
          <h3 class="small muted">👤 用户个性化推荐</h3>
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
            <label>输入用户ID：<input id="u_id" value="1" style="width:80px;padding:6px;border:1px solid #ddd" /></label>
            <button id="u_btn" class="button">获取推荐</button>
          </div>
          <div id="u_chart" style="width:100%;height:280px;margin-bottom:12px"></div>
          <div id="u_table" class="table-wrap"></div>
        </div>
      </main>
    </div>

    <script>
      function renderTable(target, rows, columns){
        if (!rows || rows.length === 0) {
          document.getElementById(target).innerHTML = '<div class="small muted">暂无可展示结果</div>';
          return;
        }
        const header = columns.map(c=>`<th>${c.label}</th>`).join('');
        const body = rows.map(item => `<tr>${columns.map(c=>`<td>${item[c.key] ?? ''}</td>`).join('')}</tr>`).join('');
        document.getElementById(target).innerHTML = `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
      }

      document.getElementById('m_btn').onclick = async ()=>{
        const id = document.getElementById('m_id').value;
        const r = await fetch(`/api/recommend/movie_similar?movie_id=${id}`);
        const j = await r.json();
        const data = j.data || [];
        
        // 渲染表格
        renderTable('m_table', data, [
          {key:'movie_id',label:'影片ID'},
          {key:'movie_name',label:'影片名称'},
          {key:'movie_type',label:'类型'},
          {key:'similarity',label:'相似度'}
        ]);
        
        // 渲染图表
        const chart = echarts.init(document.getElementById('m_chart'));
        chart.setOption({
          tooltip:{trigger:'axis'},
          xAxis:{type:'category',data:data.map(d=>d.movie_name),axisLabel:{interval:0,rotate:30}},
          yAxis:{type:'value',name:'相似度',min:0,max:1},
          series:[{
            type:'bar',
            data:data.map(d=>d.similarity),
            itemStyle:{color:new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#06b6d4'}, {offset: 1, color: '#67e8f9'}])}
          }]
        });
      }

      document.getElementById('u_btn').onclick = async ()=>{
        const id = document.getElementById('u_id').value;
        const r = await fetch(`/api/recommend/user_personal?user_id=${id}`);
        const j = await r.json();
        const data = j.data || [];
        
        // 渲染表格
        renderTable('u_table', data, [
          {key:'movie_id',label:'影片ID'},
          {key:'movie_name',label:'影片名称'},
          {key:'score_avg',label:'评分'},
          {key:'recommend_score',label:'推荐分'}
        ]);
        
        // 渲染图表
        const chart = echarts.init(document.getElementById('u_chart'));
        chart.setOption({
          tooltip:{trigger:'axis'},
          xAxis:{type:'category',data:data.map(d=>d.movie_name),axisLabel:{interval:0,rotate:30}},
          yAxis:{type:'value',name:'推荐分'},
          series:[{
            type:'bar',
            data:data.map(d=>d.recommend_score),
            itemStyle:{color:new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#8b5cf6'}, {offset: 1, color: '#d8b4fe'}])}
          }]
        });
      }
    </script>
  </body>
</html>
